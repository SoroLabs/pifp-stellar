name: Deploy to Staging

on:
  push:
    branches:
      - develop
    paths:
      - 'Dockerfile'
      - 'keeper/**'
      - 'backend/**'
      - 'contracts/**'
      - 'scripts/deploy_staging.sh'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: false
        default: 'true'

env:
  REGISTRY: ghcr.io
  ORGANIZATION: ${{ github.repository_owner }}
  IMAGE_NAME: pifp-stellar

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for git describe
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        run: |
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "commit_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "version=$(cat VERSION 2>/dev/null || echo '0.1.0')" >> $GITHUB_OUTPUT
      
      - name: Run deployment script
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_PUSH: ${{ inputs.push_images || 'true' }}
          LOG_LEVEL: INFO
        run: |
          chmod +x scripts/deploy_staging.sh
          ./scripts/deploy_staging.sh \
            --registry "${{ env.REGISTRY }}" \
            --org "${{ env.ORGANIZATION }}" \
            --push
      
      - name: Upload deployment logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deployment-logs
          path: deployment.log
      
      - name: Upload deployment manifest
        uses: actions/upload-artifact@v7
        with:
          name: deployment-manifest
          path: .deployment/staging-manifest.yaml
      
      - name: Create deployment record
        if: success()
        run: |
          echo "## Staging Deployment ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ steps.meta.outputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Short SHA**: ${{ steps.meta.outputs.commit_short }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date**: ${{ steps.meta.outputs.build_date }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to ${{ env.REGISTRY }}/${{ env.ORGANIZATION }}/" >> $GITHUB_STEP_SUMMARY