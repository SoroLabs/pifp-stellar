name: CI

on:
  push:
    branches: [ "main", "develop", "feat/*" ]
  pull_request:
    branches: [ "main", "develop", "feat/*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Tests
        run: cargo test --workspace

  wasm-build:
    name: Build & Upload WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Add wasm32v1-none target
        run: rustup target add wasm32v1-none

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Stellar CLI
        run: |
          wget -q https://github.com/stellar/stellar-cli/releases/download/v25.1.0/stellar-cli-25.1.0-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf stellar-cli-25.1.0-x86_64-unknown-linux-gnu.tar.gz
          sudo mv stellar /usr/local/bin/

      - name: Build Smart Contract
        run: stellar contract build --manifest-path contracts/pifp_protocol/Cargo.toml

      - name: Upload WASM
        uses: actions/upload-artifact@v7
        with:
          name: pifp-protocol-wasm
          path: target/wasm32v1-none/release/pifp_protocol.wasm
