name: Migration Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  db-migrations:
    name: Database Migration & Rollback
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite

      - name: Setup Test Environment
        run: |
          echo "DATABASE_URL=sqlite://pifp_test.db" >> $GITHUB_ENV
          touch pifp_test.db
          
      - name: Run Up Migrations
        working-directory: backend/indexer
        run: |
          sqlx migrate run --database-url ${{ env.DATABASE_URL }}

      - name: Test Migration Rollback
        working-directory: backend/indexer
        run: |
          # Revert all migrations (9 currently)
          for i in {1..9}; do
            sqlx migrate revert --database-url ${{ env.DATABASE_URL }}
          done
          sqlx migrate run --database-url ${{ env.DATABASE_URL }}
